kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: skillpulse

nodes:
  - role: control-plane
    image: kindest/node:v1.30.0     #previous version: v1.35.1

    extraPortMappings:
      - containerPort: 30080        #represent backend service port container
        hostPort: 8888              #hostPort exposes it outside EC2
        protocol: TCP

      - containerPort: 30081        #represent frontend service port container
        hostPort: 8081              #hostPort exposes it outside EC2
        protocol: TCP

  - role: worker
    image: kindest/node:v1.30.0     #previous version: v1.35.1

  - role: worker
    image: kindest/node:v1.30.0