apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skillpulse-ingress
  namespace: skillpulse
spec:
  ingressClassName: nginx
  rules:
    - host: localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080